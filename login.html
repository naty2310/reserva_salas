<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Sistema de Reservas</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">

    <style>
        /* 1. CONFIGURAÇÃO DO FUNDO */
        body {
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            background-color: #f1d643;
            background-image: 
                radial-gradient(circle at center, rgba(124, 140, 252, 0.2) 0%, rgba(124, 140, 252, 0.2) 20%, transparent 20%),
                radial-gradient(circle at center, rgba(124, 140, 252, 0.2) 0%, rgba(124, 140, 252, 0.2) 40%, transparent 40%),
                radial-gradient(circle at center, rgba(124, 140, 252, 0.2) 0%, rgba(124, 140, 252, 0.2) 60%, transparent 60%);
            background-size: 100px 100px; 
            background-position: 0 0, 50px 50px, 100px 100px; 
            animation: moveEspiral 20s linear infinite; 
            font-family: 'Inter', sans-serif;
            overflow: hidden;
        }

        @keyframes moveEspiral {
            from { background-position: 0 0, 50px 50px, 100px 100px; }
            to { background-position: 100px 100px, 150px 150px, 200px 200px; }
        }

        /* 2. O CARTÃO DE LOGIN */
        .card-login {
            background: #ffffff;
            padding: 40px;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            z-index: 10;
            width: 90%;
            max-width: 350px;
            position: relative;
        }
    </style>
</head>
